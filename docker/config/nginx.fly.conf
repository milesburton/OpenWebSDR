# nginx config for Fly.io deployment.
# Upstream services are reached via Fly's private WireGuard network
# using <app-name>.internal hostnames.

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Fly terminates TLS — listen on 8080 internally
    # (Fly's anycast network handles 80/443 externally)

    location /api/ {
        proxy_pass         http://next-sdr-control-api.internal:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        proxy_pass         http://next-sdr-session-gateway.internal:3004;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    location /healthz/ {
        proxy_pass http://next-sdr-control-api.internal:3000;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
}
